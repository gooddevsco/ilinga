<!DOCTYPE html>
<html lang="en"><head>
  <meta charset="utf-8">
  <title>Ilinga</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
/* Ilinga — Light enterprise · African earth palette */
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  /* Earth palette — warm, light, enterprise */
  --paper: #FAF6EF;          /* page background — bone */
  --paper-1: #F4EEE2;        /* warm sand */
  --paper-2: #ECE3D2;        /* deeper sand */
  --paper-3: #DDD0B7;        /* clay tint */
  --ink: #1F1B16;            /* near-black w/ warmth */
  --ink-2: #3A3128;
  --ink-mute: #6E6457;
  --ink-faint: #9A8E7C;

  /* Earth signal — terracotta clay */
  --signal: #B8531C;         /* terracotta */
  --signal-deep: #8E3D14;
  --signal-soft: #F0DBC8;
  --signal-ink: #FFFFFF;

  /* Accents */
  --ochre: #C58A2C;          /* yellow ochre */
  --ochre-soft: #F2E0B8;
  --indigo: #284B63;         /* west african indigo */
  --indigo-soft: #D6E0E6;
  --green: #5B7A3A;          /* baobab leaf */
  --green-soft: #DDE5CB;
  --warn: #C58A2C;
  --danger: #A03825;

  /* Lines on paper */
  --line: rgba(31,27,22,0.10);
  --line-2: rgba(31,27,22,0.18);
  --line-3: rgba(31,27,22,0.28);

  /* Surfaces */
  --bg: var(--paper);
  --bg-1: #FFFCF5;           /* card surface — warm white */
  --bg-2: #F4EEE2;
  --bg-3: #ECE3D2;

  --radius: 6px;
  --radius-lg: 10px;
  --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  --sans: 'Inter', ui-sans-serif, system-ui, -apple-system, Helvetica, Arial, sans-serif;
  --serif: 'Fraunces', ui-serif, Georgia, serif;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-feature-settings: "ss01", "cv11";
  font-size: 14px;
  line-height: 1.5;
}
button { font-family: inherit; cursor: pointer; border: 0; background: none; color: inherit; padding: 0; }
input, textarea, select { font-family: inherit; color: inherit; }
a { color: inherit; text-decoration: none; }

.mono { font-family: var(--mono); font-variant-ligatures: none; }
.serif { font-family: var(--serif); }
.kbd {
  font-family: var(--mono); font-size: 11px;
  padding: 2px 6px; border: 1px solid var(--line);
  border-radius: 4px;
  background: var(--bg-1); color: var(--ink-mute);
}

.eyebrow {
  font-family: var(--mono); font-size: 11px;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--ink-mute);
}
.eyebrow.on-paper { color: var(--ink-mute); }

.divider, .divider-paper { height: 1px; background: var(--line); }

/* buttons — light enterprise */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 14px; height: 34px;
  border: 1px solid var(--line-2);
  border-radius: var(--radius);
  font-size: 13px; font-weight: 500;
  background: var(--bg-1); color: var(--ink);
  transition: background 120ms ease, border-color 120ms ease, transform 120ms ease;
}
.btn:hover { background: var(--paper-1); border-color: var(--line-3); }
.btn:active { transform: translateY(1px); }
.btn.primary {
  background: var(--ink); color: var(--paper);
  border-color: var(--ink);
  font-weight: 500;
}
.btn.primary:hover { background: var(--ink-2); border-color: var(--ink-2); }
.btn.signal {
  background: var(--signal); color: var(--signal-ink);
  border-color: var(--signal);
  font-weight: 500;
}
.btn.signal:hover { background: var(--signal-deep); border-color: var(--signal-deep); }
.btn.ghost { background: transparent; border-color: transparent; }
.btn.ghost:hover { background: var(--paper-1); border-color: var(--line); }
.btn.sm { height: 28px; padding: 4px 10px; font-size: 12px; }
.btn.lg { height: 44px; padding: 10px 18px; font-size: 14px; }
.btn.on-paper { background: white; color: var(--ink); border-color: var(--line-2); }
.btn.primary.on-paper { background: var(--ink); color: var(--paper); border-color: var(--ink); }

/* tag / chip */
.tag {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 8px; border: 1px solid var(--line-2);
  border-radius: 4px;
  font-family: var(--mono); font-size: 11px;
  color: var(--ink-mute); background: var(--bg-1);
}
.tag.signal { color: var(--signal); border-color: color-mix(in oklch, var(--signal) 35%, transparent); background: var(--signal-soft); }
.tag.ochre { color: var(--ochre); border-color: color-mix(in oklch, var(--ochre) 35%, transparent); background: var(--ochre-soft); }
.tag.indigo { color: var(--indigo); border-color: color-mix(in oklch, var(--indigo) 35%, transparent); background: var(--indigo-soft); }
.tag.green { color: var(--green); border-color: color-mix(in oklch, var(--green) 35%, transparent); background: var(--green-soft); }
.tag .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

/* surface card */
.card {
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
}
.card.paper { background: white; border-color: var(--line); color: var(--ink); }

/* form */
.field-label {
  display: block;
  font-family: var(--mono); font-size: 11px;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 8px;
}
.input, .textarea, .select {
  width: 100%;
  background: white;
  border: 1px solid var(--line-2);
  border-radius: var(--radius);
  padding: 10px 12px;
  font-size: 14px;
  color: var(--ink);
  transition: border-color 120ms ease, background 120ms ease, box-shadow 120ms ease;
}
.input::placeholder, .textarea::placeholder { color: var(--ink-faint); }
.input:focus, .textarea:focus, .select:focus {
  outline: none;
  border-color: var(--signal);
  box-shadow: 0 0 0 3px color-mix(in oklch, var(--signal) 18%, transparent);
}
.textarea { min-height: 96px; resize: vertical; line-height: 1.55; }
.input.lg { height: 48px; padding: 12px 14px; font-size: 15px; }

/* OTP input cells */
.otp-cell {
  width: 52px; height: 60px;
  border: 1px solid var(--line-2);
  border-radius: 8px;
  background: white;
  font-family: var(--mono); font-size: 24px;
  text-align: center; color: var(--ink);
  transition: border-color 120ms ease, box-shadow 120ms ease;
}
.otp-cell:focus { outline: none; border-color: var(--signal); box-shadow: 0 0 0 3px color-mix(in oklch, var(--signal) 18%, transparent); }
.otp-cell.filled { background: var(--signal-soft); border-color: color-mix(in oklch, var(--signal) 40%, transparent); }

/* progress */
.bar { height: 4px; background: var(--paper-2); border-radius: 2px; overflow: hidden; }
.bar > i { display: block; height: 100%; background: var(--signal); transition: width 320ms ease; }

/* scrollbars */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: rgba(31,27,22,0.14); border-radius: 5px; }
::-webkit-scrollbar-thumb:hover { background: rgba(31,27,22,0.24); }
::-webkit-scrollbar-track { background: transparent; }

/* hairline grid */
.grid-bg {
  background-image:
    linear-gradient(to right, var(--line) 1px, transparent 1px),
    linear-gradient(to bottom, var(--line) 1px, transparent 1px);
  background-size: 64px 64px;
}

/* placeholder image */
.placeholder {
  background:
    repeating-linear-gradient(135deg, rgba(31,27,22,0.04) 0 8px, transparent 8px 16px),
    var(--paper-1);
  border: 1px dashed var(--line-2);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 11px; color: var(--ink-mute);
  letter-spacing: 0.08em; text-transform: uppercase;
  border-radius: var(--radius);
}

/* animation */
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.pulse { animation: pulse 1.6s ease-in-out infinite; }

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}
.shake { animation: shake 320ms ease; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-up { animation: fadeUp 240ms cubic-bezier(.2,.8,.2,1) both; }

/* sidebar nav item */
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 10px; border-radius: 5px;
  color: var(--ink-mute); font-size: 13px;
  cursor: pointer;
  transition: background 100ms ease, color 100ms ease;
}
.nav-item:hover { background: var(--paper-1); color: var(--ink); }
.nav-item.active { background: var(--paper-2); color: var(--ink); font-weight: 500; }
.nav-item .ico { width: 14px; height: 14px; opacity: 0.8; }
.nav-section {
  font-family: var(--mono); font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.14em;
  color: var(--ink-faint);
  padding: 14px 10px 6px;
}

/* progress map (left column) */
.cluster-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 6px;
  cursor: pointer;
  border: 1px solid transparent;
}
.cluster-row:hover { background: var(--paper-1); }
.cluster-row.active { background: var(--paper-1); border-color: var(--line-2); }
.cluster-row .num {
  font-family: var(--mono); font-size: 11px; color: var(--ink-faint);
  width: 22px;
}
.cluster-row .ring {
  --p: 0;
  width: 16px; height: 16px; border-radius: 50%;
  background:
    conic-gradient(var(--signal) calc(var(--p) * 1%), var(--paper-2) 0);
  position: relative;
}
.cluster-row .ring::after {
  content: '';
  position: absolute; inset: 3px;
  border-radius: 50%; background: var(--bg-1);
}
.cluster-row.done .ring { background: var(--signal); }
.cluster-row.done .ring::after { background: var(--signal); }

/* table */
table.cmp { width: 100%; border-collapse: collapse; }
table.cmp th, table.cmp td {
  text-align: left;
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
  font-size: 13px;
}
table.cmp th {
  font-family: var(--mono); font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.10em;
  color: var(--ink-mute); font-weight: 500;
}

.bars { display: flex; gap: 2px; align-items: flex-end; height: 22px; }
.bars i { display: block; width: 4px; background: var(--ink-faint); border-radius: 1px; }
.bars i.hi { background: var(--signal); }

/* Adinkra-inspired ornament — subtle paper pattern */
.adinkra-bg {
  background-color: var(--paper);
  background-image:
    radial-gradient(circle at 0 0, var(--line) 1px, transparent 1.5px),
    radial-gradient(circle at 32px 32px, var(--line) 1px, transparent 1.5px);
  background-size: 64px 64px;
}

/* Auth split */
.auth-split {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
  background: var(--paper);
}
.auth-form-pane {
  padding: 56px 72px;
  display: flex; flex-direction: column;
  background: var(--paper);
}
.auth-art-pane {
  position: relative; overflow: hidden;
  background: var(--paper-1);
  border-left: 1px solid var(--line);
}

/* Responsive */
.r-mobile-topbar { display: none; }
.r-drawer { display: none; }
.r-mobile-only { display: none !important; }

@media (max-width: 1180px) {
  .r-3col { grid-template-columns: 1fr 1fr !important; }
  .r-cards-4 { grid-template-columns: repeat(2, 1fr) !important; }
  .r-cards-3 { grid-template-columns: repeat(2, 1fr) !important; }
  .r-pricing-grid { grid-template-columns: repeat(2, 1fr) !important; }
  .r-interview-grid { grid-template-columns: 280px 1fr !important; }
  .r-interview-grid > .r-interview-rail { display: none !important; }
  .r-outputs-grid { grid-template-columns: 260px 1fr !important; }
  .r-onboard-body { grid-template-columns: 1fr !important; }
  .r-onboard-rail { border-left: none !important; border-top: 1px solid var(--line); }
  .r-pad { padding: 22px !important; }
}

@media (max-width: 860px) {
  .r-2col, .r-3col, .r-split, .r-cards-3, .r-cards-4, .r-pricing-grid,
  .r-onboard-body, .r-reports-detail, .r-credits-balance,
  .r-2col-stat, .r-2col-form { grid-template-columns: 1fr !important; }

  .r-interview-grid, .r-outputs-grid, .r-settings-grid {
    grid-template-columns: 1fr !important;
  }
  .auth-split { grid-template-columns: 1fr !important; }
  .auth-art-pane { display: none !important; }
  .auth-form-pane { padding: 28px 22px !important; }

  .r-sidebar { display: none !important; }
  .r-app-shell { grid-template-columns: 1fr !important; }
  .r-mobile-topbar { display: flex !important; }
  .r-mobile-hide { display: none !important; }
  .r-mobile-only { display: flex !important; }

  .r-pad { padding: 16px !important; }
  .r-pad-lg { padding: 24px 16px !important; }
  .r-pad-xl { padding: 40px 18px !important; }

  .r-h-display { font-size: 40px !important; line-height: 1.05 !important; }
  .r-h-1 { font-size: 28px !important; }
  .r-h-2 { font-size: 22px !important; }

  .r-side-rail { display: none !important; }
  .r-nav-row { overflow-x: auto !important; flex-wrap: nowrap !important; }
  .r-nav-row::-webkit-scrollbar { height: 0; }
  .r-table-wrap { overflow-x: auto; }
  .r-table-wrap table { min-width: 640px; }
  .r-fluid { max-width: 100% !important; width: auto !important; min-width: 0 !important; }
  .r-fluid-input { min-width: 0 !important; width: 100% !important; }
  .r-stack { flex-direction: column !important; align-items: stretch !important; }
  .r-stack > * { width: 100% !important; }
  .r-hide-mobile { display: none !important; }
  .btn.lg { height: 40px; padding: 8px 14px; font-size: 13px; }
  .r-paper-shell { padding: 14px !important; }
  .r-paper-page { padding: 28px !important; }
  .r-synth-stages { overflow-x: auto; }
  .r-synth-stages > div { min-width: 720px; }
  .otp-cell { width: 44px; height: 52px; font-size: 20px; }
}

/* drawer */
.r-drawer-mask {
  position: fixed; inset: 0;
  background: rgba(31,27,22,0.45);
  z-index: 80; opacity: 0; pointer-events: none;
  transition: opacity 200ms ease;
}
.r-drawer-mask.open { opacity: 1; pointer-events: auto; }
.r-drawer-panel {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: min(280px, 86vw);
  background: var(--bg);
  border-right: 1px solid var(--line);
  z-index: 81;
  transform: translateX(-100%);
  transition: transform 220ms cubic-bezier(.2,.8,.2,1);
  display: flex; flex-direction: column;
  overflow: auto;
}
.r-drawer-panel.open { transform: translateX(0); }

                      <div className="mono" style={{ fontSize: 11, color: 'var(--signal)' }}>{p.credits.toUpperCase()}</div>
                    </div>
                  </button>
                ))}
              </div>
              <div style={{ display: 'flex', gap: 8 }}>
                <button className="btn lg" onClick={() => setStep(1)}>{I.arrowLeft} Back</button>
                <button className="btn primary lg" style={{ flex: 1 }} onClick={finish}>Create workspace {I.arrow}</button>

        </div>
      </div>

              <div style={{
                width: 44, height: 44, borderRadius: 10, background: 'var(--signal)', color: 'var(--signal-ink)',

            <div className="r-2col-stat" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>

          <div className="card" style={{ padding: 20 }}>

// ============================================================
// SIGN IN — email + (magic link OR password) → optional OTP
// ============================================================
function SignIn() {
  const { setRoute, toast } = useApp();
  const [step, setStep] = useState(0);   // 0 method, 1 password OR OTP, 2 sent confirmation
  const [mode, setMode] = useState('magic'); // magic | password
  const [email, setEmail] = useState('');
  const [pw, setPw] = useState('');
  const [otp, setOtp] = useState(['', '', '', '', '', '']);
  const [err, setErr] = useState('');
  const otpRefs = useRef([]);

  const submitEmail = (e) => {
    e && e.preventDefault();
    if (!/^\S+@\S+\.\S+$/.test(email)) { setErr('Use your work email.'); return; }
    setErr('');
    if (mode === 'magic') setStep(2);
    else setStep(1);
  };
  const submitPassword = () => {
    if (pw.length < 4) { setErr('Password too short.'); return; }
    setErr('');
    // simulate trusted-device step
    setStep(3);
  };
  const submitOtp = () => {
    if (otp.join('').length < 6) { setErr('Enter all 6 digits.'); return; }
    toast('Welcome back, Ada.');
    setRoute('app');
  };
  const onOtpKey = (i, e) => {
    if (e.key === 'Backspace' && !otp[i] && i > 0) otpRefs.current[i - 1]?.focus();
  };
  const onOtpChange = (i, v) => {
    const d = v.replace(/\D/g, '').slice(0, 1);
    const next = [...otp]; next[i] = d; setOtp(next);
    if (d && i < 5) otpRefs.current[i + 1]?.focus();
  };
  const onOtpPaste = (e) => {
    const t = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);
    if (t.length) { setOtp(t.padEnd(6, '').split('').slice(0, 6)); otpRefs.current[Math.min(t.length, 5)]?.focus(); e.preventDefault(); }
  };

  return (
    <div className="auth-split">
      <div className="auth-form-pane">
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <BrandMark />
          <div style={{ fontSize: 13, color: 'var(--ink-mute)' }}>
            New here? <a onClick={() => setRoute('signup')} style={{ color: 'var(--signal)', cursor: 'pointer', fontWeight: 500 }}>Create a workspace</a>
          </div>
        </div>

        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center', maxWidth: 440, width: '100%', margin: '0 auto', padding: '40px 0' }}>

          {step === 0 && (
            <div className="fade-up" style={{ display: 'flex', flexDirection: 'column', gap: 22 }}>
              <div>
                <div className="eyebrow">SIGN IN</div>
                <h1 className="r-h-1" style={{ fontFamily: 'var(--serif)', fontSize: 40, fontWeight: 500, letterSpacing: '-0.025em', margin: '10px 0 6px', lineHeight: 1.05 }}>
                  Welcome back.
                </h1>
                <p style={{ color: 'var(--ink-mute)', margin: 0 }}>Sign in to continue your venture.</p>
              </div>

              <div style={{ display: 'flex', gap: 8 }}>
                <button className="btn lg" style={{ flex: 1, justifyContent: 'center' }}>{I.google} Google</button>
                <button className="btn lg" style={{ flex: 1, justifyContent: 'center' }}>{I.lock} SSO</button>
              </div>

              <div style={{ display: 'flex', alignItems: 'center', gap: 12, color: 'var(--ink-faint)', fontSize: 11, fontFamily: 'var(--mono)', letterSpacing: '0.10em' }}>
                <span style={{ flex: 1, height: 1, background: 'var(--line)' }} /> OR EMAIL <span style={{ flex: 1, height: 1, background: 'var(--line)' }} />
              </div>

              <form onSubmit={submitEmail} style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
                <div>
                  <label className="field-label">Work email</label>
                  <input className={`input lg ${err ? 'shake' : ''}`} placeholder="ada@northwind.co" value={email} onChange={(e) => setEmail(e.target.value)} autoFocus />
                  {err && <div style={{ color: 'var(--danger)', fontSize: 12, marginTop: 6 }}>{err}</div>}
                </div>

                {/* method toggle */}
                <div className="card" style={{ padding: 4, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 4 }}>
                  {[
                    { id: 'magic', l: 'Magic link', d: 'one-tap from your inbox' },
                    { id: 'password', l: 'Password', d: 'classic + 2FA prompt' },
                  ].map((m) => (
                    <button type="button" key={m.id} onClick={() => setMode(m.id)} style={{
                      padding: '10px 12px', borderRadius: 6, textAlign: 'left',
                      background: mode === m.id ? 'var(--paper-2)' : 'transparent',
                      border: mode === m.id ? '1px solid var(--line-2)' : '1px solid transparent',
                    }}>
                      <div style={{ fontSize: 13, fontWeight: 500 }}>{m.l}</div>
                      <div style={{ fontSize: 11, color: 'var(--ink-mute)', marginTop: 2 }}>{m.d}</div>
                    </button>
                  ))}
                </div>

                <button type="submit" className="btn primary lg" style={{ justifyContent: 'center', marginTop: 4 }}>
                  {mode === 'magic' ? 'Email me a link' : 'Continue'} {I.arrow}
                </button>
              </form>

              <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, color: 'var(--ink-mute)' }}>
                <a onClick={() => setRoute('forgot')} style={{ cursor: 'pointer' }}>Forgot password?</a>
                <a onClick={() => setRoute('forgot')} style={{ cursor: 'pointer' }}>Use a recovery code</a>
              </div>
            </div>
          )}

          {/* Password step */}
          {step === 1 && (
            <div className="fade-up" style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
              <button className="btn sm ghost" style={{ alignSelf: 'flex-start', marginLeft: -8 }} onClick={() => setStep(0)}>{I.arrowLeft} Back</button>
              <div>
                <div className="eyebrow">PASSWORD</div>
                <h1 className="r-h-1" style={{ fontFamily: 'var(--serif)', fontSize: 36, fontWeight: 500, letterSpacing: '-0.025em', margin: '8px 0 6px', lineHeight: 1.05 }}>
                  Enter your password.
                </h1>
                <p style={{ color: 'var(--ink-mute)', margin: 0, fontSize: 13 }}>Signing in as <span className="mono" style={{ color: 'var(--ink)' }}>{email}</span></p>
              </div>
              <div>
                <label className="field-label">Password</label>
                <input className={`input lg ${err ? 'shake' : ''}`} type="password" value={pw} onChange={(e) => setPw(e.target.value)} autoFocus />
                {err && <div style={{ color: 'var(--danger)', fontSize: 12, marginTop: 6 }}>{err}</div>}
                <div style={{ marginTop: 8, fontSize: 12 }}>
                  <a onClick={() => setRoute('forgot')} style={{ color: 'var(--signal)', cursor: 'pointer' }}>Forgot password?</a>
                </div>
              </div>
              <button className="btn primary lg" style={{ justifyContent: 'center' }} onClick={submitPassword}>Continue {I.arrow}</button>
            </div>
          )}

          {/* Magic-link sent confirmation */}
          {step === 2 && (
            <div className="fade-up" style={{ display: 'flex', flexDirection: 'column', gap: 18, textAlign: 'center', alignItems: 'center' }}>
              <div style={{
                width: 64, height: 64, borderRadius: '50%',
                background: 'var(--signal-soft)', color: 'var(--signal)',
                display: 'grid', placeItems: 'center',
              }}>{I.mail}</div>
              <div>
                <div className="eyebrow">CHECK YOUR INBOX</div>
                <h1 className="r-h-1" style={{ fontFamily: 'var(--serif)', fontSize: 36, fontWeight: 500, letterSpacing: '-0.025em', margin: '8px 0 6px', lineHeight: 1.05 }}>
                  Magic link on the way.
                </h1>
                <p style={{ color: 'var(--ink-mute)', margin: 0 }}>We sent a one-tap sign-in link to</p>
                <p className="mono" style={{ marginTop: 4, fontSize: 14 }}>{email}</p>
              </div>
              <div className="card" style={{ padding: 14, textAlign: 'left', fontSize: 12, color: 'var(--ink-mute)', maxWidth: 360 }}>
                The link expires in <strong style={{ color: 'var(--ink)' }}>10 minutes</strong>. Didn’t get it?
                Check spam, or <a onClick={() => { toast('Link resent.'); }} style={{ color: 'var(--signal)', cursor: 'pointer' }}>resend</a>.
              </div>
              <div style={{ display: 'flex', gap: 8 }}>
                <button className="btn" onClick={() => setStep(0)}>Use a different email</button>
                <button className="btn primary" onClick={() => setStep(4)}>Enter code instead</button>
              </div>
            </div>
          )}

          {/* Trusted-device 2FA */}
          {step === 3 && (
            <div className="fade-up" style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
              <div>
                <div className="eyebrow">TWO-FACTOR</div>
                <h1 className="r-h-1" style={{ fontFamily: 'var(--serif)', fontSize: 36, fontWeight: 500, letterSpacing: '-0.025em', margin: '8px 0 6px', lineHeight: 1.05 }}>
                  Verify it’s you.
                </h1>
                <p style={{ color: 'var(--ink-mute)', margin: 0 }}>Enter the 6-digit code from your authenticator app.</p>
              </div>
              <OtpInput otp={otp} setOtp={setOtp} refs={otpRefs} onPaste={onOtpPaste} onKey={onOtpKey} onChange={onOtpChange} err={err} />
              {err && <div style={{ color: 'var(--danger)', fontSize: 12 }}>{err}</div>}
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: 12 }}>
                <a onClick={() => setStep(0)} style={{ color: 'var(--ink-mute)', cursor: 'pointer' }}>Use a recovery code</a>
                <label style={{ display: 'flex', gap: 6, alignItems: 'center', color: 'var(--ink-mute)' }}>
                  <input type="checkbox" /> Trust this device for 30 days
                </label>
              </div>
              <button className="btn primary lg" style={{ justifyContent: 'center' }} onClick={submitOtp}>Sign in {I.arrow}</button>
            </div>
          )}

          {step === 4 && (
            <div className="fade-up" style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
              <button className="btn sm ghost" style={{ alignSelf: 'flex-start', marginLeft: -8 }} onClick={() => setStep(2)}>{I.arrowLeft} Back</button>
              <div>
                <div className="eyebrow">EMAIL CODE</div>
                <h1 className="r-h-1" style={{ fontFamily: 'var(--serif)', fontSize: 36, fontWeight: 500, letterSpacing: '-0.025em', margin: '8px 0 6px', lineHeight: 1.05 }}>
                  Enter the 6-digit code.
                </h1>
                <p style={{ color: 'var(--ink-mute)', margin: 0 }}>Sent to <span className="mono" style={{ color: 'var(--ink)' }}>{email}</span></p>
              </div>
              <OtpInput otp={otp} setOtp={setOtp} refs={otpRefs} onPaste={onOtpPaste} onKey={onOtpKey} onChange={onOtpChange} err={err} />
              {err && <div style={{ color: 'var(--danger)', fontSize: 12 }}>{err}</div>}
              <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, color: 'var(--ink-mute)' }}>
                <span>Resend in <span className="mono">00:42</span></span>
                <a onClick={() => toast('Code resent.')} style={{ color: 'var(--signal)', cursor: 'pointer' }}>Resend now</a>
              </div>
              <button className="btn primary lg" style={{ justifyContent: 'center' }} onClick={submitOtp}>Sign in {I.arrow}</button>
            </div>
          )}

        </div>

        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, color: 'var(--ink-faint)', fontFamily: 'var(--mono)', letterSpacing: '0.08em' }}>
          <span>ILINGA · ©2026</span>
          <span>SOC 2 · GDPR · POPIA</span>
        </div>
      </div>

      <AuthArt
        caption={<><span style={{ fontStyle: 'italic' }}>“Nyansapo”</span> — wisdom knot. Untangle the strategy, one question at a time.</>}
        sub="Ilinga interviews founders with structured questions, then ships a source-ready report — billed by the credit, opinionated by design."
      />
    </div>
  );
}

// OTP component
function OtpInput({ otp, setOtp, refs, onPaste, onKey, onChange, err }) {
  return (
    <div onPaste={onPaste} className={err ? 'shake' : ''} style={{ display: 'flex', gap: 8, justifyContent: 'space-between' }}>
      {otp.map((v, i) => (
        <input
          key={i}
          ref={(el) => (refs.current[i] = el)}
          className={`otp-cell ${v ? 'filled' : ''}`}
          value={v}
          inputMode="numeric"
          maxLength={1}
          onChange={(e) => onChange(i, e.target.value)}
          onKeyDown={(e) => onKey(i, e)}
          autoFocus={i === 0}
        />
      ))}
    </div>
  );
}

// ============================================================
// FORGOT PASSWORD — email → code → new password
// ============================================================
function ForgotPassword() {
  const { setRoute, toast } = useApp();
  const [step, setStep] = useState(0); // 0 email, 1 code, 2 reset, 3 done
  const [email, setEmail] = useState('');
  const [otp, setOtp] = useState(['', '', '', '', '', '']);
  const [pw, setPw] = useState('');
  const [pw2, setPw2] = useState('');
  const [err, setErr] = useState('');
  const otpRefs = useRef([]);

  const onOtpChange = (i, v) => {
    const d = v.replace(/\D/g, '').slice(0, 1);
    const n = [...otp]; n[i] = d; setOtp(n);
    if (d && i < 5) otpRefs.current[i + 1]?.focus();
  };
  const onOtpKey = (i, e) => {
    if (e.key === 'Backspace' && !otp[i] && i > 0) otpRefs.current[i - 1]?.focus();
  };
  const onOtpPaste = (e) => {
    const t = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);
    if (t.length) { setOtp(t.padEnd(6, '').split('').slice(0, 6)); otpRefs.current[Math.min(t.length, 5)]?.focus(); e.preventDefault(); }
  };

  const submitEmail = (e) => {
    e && e.preventDefault();
    if (!/^\S+@\S+\.\S+$/.test(email)) { setErr('Use a valid email.'); return; }
    setErr(''); setStep(1);
  };

  const strength = useMemo(() => {
    let s = 0;
    if (pw.length >= 8) s++;
    if (/[A-Z]/.test(pw)) s++;
    if (/[0-9]/.test(pw)) s++;
    if (/[^A-Za-z0-9]/.test(pw)) s++;
    return s; // 0-4
  }, [pw]);
  const strengthLabel = ['Too short', 'Weak', 'Okay', 'Strong', 'Excellent'][strength];
  const strengthColor = ['var(--danger)', 'var(--danger)', 'var(--ochre)', 'var(--green)', 'var(--green)'][strength];

  const submitReset = () => {
    if (pw.length < 8) { setErr('At least 8 characters.'); return; }
    if (pw !== pw2) { setErr('Passwords don’t match.'); return; }
    setErr(''); setStep(3);
  };

  return (
    <div className="auth-split">
      <div className="auth-form-pane">
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <BrandMark />
          <div style={{ fontSize: 13, color: 'var(--ink-mute)' }}>
            Remembered it? <a onClick={() => setRoute('signin')} style={{ color: 'var(--signal)', cursor: 'pointer', fontWeight: 500 }}>Sign in</a>
          </div>
        </div>

        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center', maxWidth: 440, width: '100%', margin: '0 auto', padding: '40px 0' }}>
          {/* Progress */}
          <div style={{ display: 'flex', gap: 6, marginBottom: 28 }}>
            {[0, 1, 2].map((i) => (
              <div key={i} style={{ flex: 1, height: 3, borderRadius: 2, background: i <= Math.min(step, 2) ? 'var(--signal)' : 'var(--paper-2)', transition: 'background 320ms' }} />
            ))}
          </div>

          {step === 0 && (
            <form onSubmit={submitEmail} className="fade-up" style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
              <div>
                <div className="eyebrow">RESET PASSWORD · 1 OF 3</div>
                <h1 className="r-h-1" style={{ fontFamily: 'var(--serif)', fontSize: 40, fontWeight: 500, letterSpacing: '-0.025em', margin: '10px 0 6px', lineHeight: 1.05 }}>
                  Forgot your password?
                </h1>
                <p style={{ color: 'var(--ink-mute)', margin: 0 }}>Enter your work email — we’ll send a 6-digit code.</p>
              </div>
              <div>
                <label className="field-label">Work email</label>
                <input className={`input lg ${err ? 'shake' : ''}`} placeholder="ada@northwind.co" value={email} onChange={(e) => setEmail(e.target.value)} autoFocus />
                {err && <div style={{ color: 'var(--danger)', fontSize: 12, marginTop: 6 }}>{err}</div>}
              </div>
              <button type="submit" className="btn primary lg" style={{ justifyContent: 'center' }}>Send code {I.arrow}</button>
              <a onClick={() => setRoute('signin')} style={{ fontSize: 12, color: 'var(--ink-mute)', cursor: 'pointer', textAlign: 'center' }}>Back to sign in</a>
            </form>
          )}

          {step === 1 && (
            <div className="fade-up" style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
              <div>
                <div className="eyebrow">RESET PASSWORD · 2 OF 3</div>
                <h1 className="r-h-1" style={{ fontFamily: 'var(--serif)', fontSize: 40, fontWeight: 500, letterSpacing: '-0.025em', margin: '10px 0 6px', lineHeight: 1.05 }}>
                  Enter the code.
                </h1>
                <p style={{ color: 'var(--ink-mute)', margin: 0 }}>Sent to <span className="mono" style={{ color: 'var(--ink)' }}>{email}</span></p>
              </div>
              <OtpInput otp={otp} setOtp={setOtp} refs={otpRefs} onPaste={onOtpPaste} onKey={onOtpKey} onChange={onOtpChange} err={err} />
              <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, color: 'var(--ink-mute)' }}>
                <span>Code expires in <span className="mono">09:42</span></span>
                <a onClick={() => toast('Code resent.')} style={{ color: 'var(--signal)', cursor: 'pointer' }}>Resend</a>
              </div>
              <div style={{ display: 'flex', gap: 8 }}>
                <button className="btn lg" onClick={() => setStep(0)}>{I.arrowLeft} Back</button>
                <button className="btn primary lg" style={{ flex: 1, justifyContent: 'center' }} onClick={() => setStep(2)}>Verify {I.arrow}</button>
              </div>
            </div>
          )}

          {step === 2 && (
            <div className="fade-up" style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
              <div>
                <div className="eyebrow">RESET PASSWORD · 3 OF 3</div>
                <h1 className="r-h-1" style={{ fontFamily: 'var(--serif)', fontSize: 40, fontWeight: 500, letterSpacing: '-0.025em', margin: '10px 0 6px', lineHeight: 1.05 }}>
                  Choose a new password.
                </h1>
                <p style={{ color: 'var(--ink-mute)', margin: 0 }}>You’ll be signed out of all other devices.</p>
              </div>
              <div>
                <label className="field-label">New password</label>
                <input className="input lg" type="password" value={pw} onChange={(e) => setPw(e.target.value)} autoFocus />
                {/* strength */}
                <div style={{ display: 'flex', gap: 4, marginTop: 8 }}>
                  {[0, 1, 2, 3].map((i) => (
                    <div key={i} style={{ flex: 1, height: 4, borderRadius: 2, background: i < strength ? strengthColor : 'var(--paper-2)' }} />
                  ))}
                </div>
                <div style={{ marginTop: 6, fontSize: 11, fontFamily: 'var(--mono)', color: 'var(--ink-mute)', letterSpacing: '0.08em' }}>
                  STRENGTH · <span style={{ color: pw ? strengthColor : 'var(--ink-faint)' }}>{pw ? strengthLabel.toUpperCase() : '—'}</span>
                </div>
              </div>
              <div>
                <label className="field-label">Confirm password</label>
                <input className={`input lg ${err && pw !== pw2 ? 'shake' : ''}`} type="password" value={pw2} onChange={(e) => setPw2(e.target.value)} />
              </div>
              {err && <div style={{ color: 'var(--danger)', fontSize: 12 }}>{err}</div>}
              <ul style={{ listStyle: 'none', padding: 0, margin: 0, display: 'flex', flexDirection: 'column', gap: 6, fontSize: 12, color: 'var(--ink-mute)' }}>
                <Rule ok={pw.length >= 8}>At least 8 characters</Rule>
                <Rule ok={/[A-Z]/.test(pw)}>One uppercase letter</Rule>
                <Rule ok={/[0-9]/.test(pw)}>One number</Rule>
                <Rule ok={/[^A-Za-z0-9]/.test(pw)}>One symbol</Rule>
              </ul>
              <button className="btn primary lg" style={{ justifyContent: 'center' }} onClick={submitReset}>Reset password {I.arrow}</button>
            </div>
          )}

          {step === 3 && (
            <div className="fade-up" style={{ display: 'flex', flexDirection: 'column', gap: 18, textAlign: 'center', alignItems: 'center' }}>
              <div style={{
                width: 64, height: 64, borderRadius: '50%',
                background: 'var(--green-soft)', color: 'var(--green)',
                display: 'grid', placeItems: 'center',
              }}>{I.check}</div>
              <div>
                <div className="eyebrow">ALL SET</div>
                <h1 className="r-h-1" style={{ fontFamily: 'var(--serif)', fontSize: 40, fontWeight: 500, letterSpacing: '-0.025em', margin: '8px 0 6px', lineHeight: 1.05 }}>
                  Password updated.
                </h1>
                <p style={{ color: 'var(--ink-mute)', margin: 0 }}>You’ve been signed out of all other devices.</p>
              </div>
              <button className="btn primary lg" style={{ justifyContent: 'center' }} onClick={() => setRoute('signin')}>Sign in now {I.arrow}</button>
            </div>
          )}
        </div>

        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, color: 'var(--ink-faint)', fontFamily: 'var(--mono)', letterSpacing: '0.08em' }}>
          <span>ILINGA · ©2026</span>
          <span>SOC 2 · GDPR · POPIA</span>
        </div>
      </div>

      <AuthArt
        caption={<><span style={{ fontStyle: 'italic' }}>“Sankofa”</span> — go back and fetch it. Reset, recover, return stronger.</>}
        sub="Codes expire in 10 minutes. We never store passwords in plaintext, and we sign you out of every device on reset."
      />
    </div>
  );
}

function Rule({ ok, children }) {
  return (
    <li style={{ display: 'flex', alignItems: 'center', gap: 8, color: ok ? 'var(--green)' : 'var(--ink-mute)' }}>
      <span style={{ width: 14, height: 14, display: 'grid', placeItems: 'center' }}>
        {ok ? I.check : <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--ink-faint)' }} />}
      </span>
      {children}
    </li>
  );
}

window.SignIn = SignIn;
window.ForgotPassword = ForgotPassword;
Object.assign(window, { SignIn, ForgotPassword, BrandMark, AuthArt, OtpInput });

</script>

function Row({ k, v, sub }) {
  return (
    <div style={{ display: 'flex', alignItems: 'baseline', gap: 16 }}>
      <div className="mono" style={{ fontSize: 11, color: 'var(--ink-faint)', letterSpacing: '0.10em', width: 130 }}>{k}</div>

    </div>
  );
}

function InferRow({ ok, label, val }) {

    <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 0', opacity: ok ? 1 : 0.4 }}>

        <div style={{ fontSize: 13, marginTop: 2 }}>{val}</div>
      </div>
    </div>
  );
}

window.Onboarding = Onboarding;
Object.assign(window, { Onboarding });

</script>

<script type="text/babel" data-file="view-synthesis.jsx">
/* global React, I, useApp */
const { I, Icon, CLUSTERS, REPORTS, ACTIVITY, AppCtx, AppProvider, useApp } = window;
const { useState, useEffect, useMemo, useRef, createContext, useContext, Fragment } = React;

function Synthesis() {
  const { setAppView } = useApp();
  const [running, setRunning] = React.useState(true);
  const [stage, setStage] = React.useState(2);

  React.useEffect(() => {
    if (!running) return;
    const t = setInterval(() => setStage((s) => Math.min(s + 1, 5)), 1400);
    return () => clearInterval(t);
  }, [running]);

  const STAGES = [
    { id: 'memory', t: 'n8n memory', d: 'Conversation log + extracted facts loaded from interview', cost: '—' },
    { id: 'route', t: 'Prompt router', d: 'Classifies which prompt graphs to fan out (8 clusters → 24 modules)', cost: '—' },
    { id: 'fill', t: 'Key extraction', d: 'Pulls 142 content keys from answers + uploaded artifacts', cost: '12 cr' },
    { id: 'synth', t: 'Module synthesis', d: 'Each module runs a pre‑built prompt with key replacements', cost: '46 cr' },
    { id: 'reduce', t: 'Cross‑module reducer', d: 'Resolves conflicts; promotes winning narratives to report keys', cost: '8 cr' },
    { id: 'render', t: 'Report renderer', d: 'Templates fill from final keys → HTML → PDF', cost: 'on demand' },
  ];

  return (
    <div style={{ padding: 28, display: 'flex', flexDirection: 'column', gap: 20, maxHeight: 'calc(100vh - 53px)', overflow: 'auto' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
        <div>
          <div className="eyebrow">SYNTHESIS PIPELINE · CYCLE 02</div>
          <h1 style={{ fontSize: 32, fontWeight: 500, letterSpacing: '-0.02em', margin: '6px 0 0' }}>Answers → keys → reports.</h1>
        </div>
        <div style={{ marginLeft: 'auto', display: 'flex', gap: 8, alignItems: 'center' }}>
          <span className="tag signal"><span className="dot pulse" /> RUNNING · STAGE {stage + 1} / 6</span>
          <button className="btn sm" onClick={() => setRunning(!running)}>{running ? 'Pause' : 'Resume'}</button>
          <button className="btn sm" onClick={() => setAppView('reports')}>Reports {I.arrow}</button>
        </div>
      </div>

      {/* Pipeline */}
      <div className="card" style={{ padding: 0 }}>
        <div className="r-synth-stages"><div style={{ display: 'grid', gridTemplateColumns: 'repeat(6, 1fr)', minWidth: 720 }}>
          {STAGES.map((s, i) => {
            const state = i < stage ? 'done' : i === stage ? 'active' : 'pending';
            return (
              <div key={s.id} style={{ padding: 18, borderRight: i < 5 ? '1px solid var(--line)' : 'none', position: 'relative' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <span style={{
                    width: 22, height: 22, borderRadius: '50%',

<script type="text/babel">
function Root() {
  const W = window;
  const { route, appView } = W.useApp();
  const Landing = W.Landing, Signup = W.Signup, Onboarding = W.Onboarding, AppShell = W.AppShell;
  const SignIn = W.SignIn, ForgotPassword = W.ForgotPassword;
  if (route === 'landing') return <Landing />;
  if (route === 'signin') return <SignIn />;
  if (route === 'forgot') return <ForgotPassword />;
  if (route === 'signup') return <Signup />;
  if (route === 'onboarding') return <Onboarding />;
  const map = {
    dashboard: W.Dashboard, venture: W.Venture, questions: W.Interview,
    synthesis: W.Synthesis, outputs: W.Outputs, reports: W.Reports,
    'report-detail': W.ReportDetail, credits: W.Credits, settings: W.Settings,
  };
  const View = map[appView] || W.Dashboard;
  return <AppShell><View /></AppShell>;
}
function App() {
  const AP = window.AppProvider;
  return <AP><Root /></AP>;
}
setTimeout(() => {
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
}, 50);
</script>
