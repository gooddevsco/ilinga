services:
  cockroach:
    image: cockroachdb/cockroach:v24.3.0
    container_name: ilinga-cockroach
    command: start-single-node --insecure --listen-addr=0.0.0.0
    ports:
      - "26257:26257"
      - "8080:8080"
    volumes:
      - cockroach-data:/cockroach/cockroach-data
    healthcheck:
      test: ["CMD-SHELL", "/cockroach/cockroach sql --insecure -e 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:8.0-alpine
    container_name: ilinga-valkey
    command: ["valkey-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - valkey-data:/data

  n8n:
    image: n8nio/n8n:1.74.0
    container_name: ilinga-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=127.0.0.1
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_TELEMETRY_DISABLED=true
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=ilinga
      - N8N_BASIC_AUTH_PASSWORD=ilinga
      - N8N_ENCRYPTION_KEY=development_only_change_for_production
    volumes:
      - n8n-data:/home/node/.n8n

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: ilinga-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ilinga
      MINIO_ROOT_PASSWORD: ilinga-dev-secret
    volumes:
      - minio-data:/data

  mailpit:
    image: axllent/mailpit:v1.21
    container_name: ilinga-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  cockroach-data:
  valkey-data:
  n8n-data:
  minio-data:
